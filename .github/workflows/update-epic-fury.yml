name: Update Epic Fury Dashboard

on:
  schedule:
    - cron: '0 0,6,12,18 * * *'
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Anthropic SDK
        run: pip install anthropic

      - name: Run updater
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python updater.py

      - name: Commit updated dashboard if changed
        run: |
          git config user.name "epic-fury-bot"
          git config user.email "epic-fury-bot@users.noreply.github.com"
          git add dashboards/iran-israel-conflict-dashboards.html
          git diff --staged --quiet || git commit -m "Auto-update dashboard: $(date -u '+%Y-%m-%d %H:%M UTC')"
          git pull --rebase origin main
          git push origin main
